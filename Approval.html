<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>承認画面</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a3557;--navy2:#274872;--accent:#2e7de1;--bg:#f0f4fa;--card:#fff;--border:#ccd6e8;--text:#1e2d42;--muted:#6b7c97;--approve:#1a5745;--reject:#8b1a1a}
body{font-family:'Noto Sans JP',Meiryo,sans-serif;background:var(--bg);color:var(--text);font-size:16px;min-height:100vh;padding-bottom:60px}
header{background:var(--navy);padding:0 16px;display:flex;align-items:center;gap:10px;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
header .logo{width:30px;height:30px;border:2px solid rgba(255,255,255,.55);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
header h1{color:#fff;font-size:16px;font-weight:700;letter-spacing:.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-manual{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:12px;font-weight:700;padding:4px 12px;border-radius:6px;text-decoration:none;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;transition:.15s;flex-shrink:0}
.btn-manual:hover{background:rgba(255,255,255,.25)}
.user-pill{margin-left:auto;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.85);font-size:12px;padding:4px 12px;border-radius:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.page{max-width:760px;margin:24px auto;padding:0 12px}
.loading-overlay{position:fixed;inset:0;background:rgba(240,244,250,.92);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.loading-overlay.hidden{display:none}
.loading-spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.loading-text{font-size:16px;color:var(--muted);font-weight:500}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#fff;border-radius:12px;padding:40px 24px;text-align:center;box-shadow:0 4px 20px rgba(26,53,87,.1);max-width:480px;margin:60px auto}
.error-box .icon{font-size:48px;margin-bottom:14px}
.error-box h2{font-size:20px;color:#c00;margin-bottom:8px}
.error-box p{font-size:16px;color:var(--muted);line-height:1.7}
#mainContent{display:none}
.role-banner{border-radius:10px;padding:18px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px;color:#fff}
.role-banner.gm{background:linear-gradient(135deg,#1a3557,#274872)}
.role-banner.bucho{background:linear-gradient(135deg,#2d1a57,#3d2472)}
.role-banner .icon-box{width:48px;height:48px;border-radius:10px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.role-banner h2{font-size:18px;margin-bottom:2px}
.role-banner p{font-size:16px;opacity:.8}
.status-bar{background:var(--card);border-radius:10px;padding:16px 18px;margin-bottom:20px;display:flex;align-items:flex-start;box-shadow:0 1px 6px rgba(26,53,87,.07)}
.step{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative}
.step:not(:last-child)::after{content:'';position:absolute;top:16px;left:50%;right:-50%;height:2px;background:var(--border);z-index:0}
.step.done::after{background:var(--approve)}
.step-dot{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--muted);position:relative;z-index:1}
.step.done .step-dot{background:var(--approve);border-color:var(--approve);color:#fff}
.step.current .step-dot{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 0 4px rgba(46,125,225,.2)}
.step-label{font-size:16px;font-weight:700;color:var(--muted);text-align:center}
.step-date{font-size:16px;color:var(--approve);text-align:center;white-space:nowrap}
.card{background:var(--card);border-radius:10px;box-shadow:0 2px 14px rgba(26,53,87,.08);overflow:hidden;margin-bottom:16px}
.card-head{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);color:#fff;padding:14px 18px;font-size:16px;font-weight:700;letter-spacing:.6px}
.detail-table{width:100%;border-collapse:collapse;font-size:16px}
.detail-table tr{border-bottom:1px solid #eef1f7}
.detail-table tr:last-child{border-bottom:none}
.detail-table td:first-child{background:#f7f9fc;font-weight:700;color:var(--muted);padding:12px 16px;white-space:nowrap;width:1%;vertical-align:top}
.detail-table td:last-child{padding:12px 16px;line-height:1.5;word-break:break-word}
.action-card{background:var(--card);border-radius:10px;padding:20px 18px;box-shadow:0 2px 14px rgba(26,53,87,.08);border:1.5px solid var(--border)}
.action-card h3{font-size:16px;font-weight:700;margin-bottom:12px}
textarea.comment{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:12px;font-size:16px;font-family:inherit;resize:none;min-height:60px;outline:none;transition:.15s;overflow:hidden}
textarea.comment:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(46,125,225,.12)}
.action-btns{display:flex;gap:12px;margin-top:16px}
.btn-approve,.btn-reject{flex:1;height:52px;border:none;border-radius:8px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:.15s}
.btn-approve{background:var(--approve);color:#fff;box-shadow:0 3px 14px rgba(26,87,69,.28)}
.btn-approve:hover{background:#236b58}
.btn-reject{background:var(--reject);color:#fff;box-shadow:0 3px 14px rgba(139,26,26,.28)}
.btn-reject:hover{background:#a52020}
.btn-approve.loading,.btn-reject.loading{opacity:.65;pointer-events:none}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:1000;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:28px 24px;max-width:420px;width:100%;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,.22);animation:mIn .2s ease-out}
@keyframes mIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal .icon{font-size:44px;margin-bottom:12px}
.modal h3{font-size:20px;font-weight:700;margin-bottom:8px}
.modal p{font-size:16px;color:var(--muted);line-height:1.65}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.modal-btns .btn{flex:1;height:44px;border-radius:7px;border:none;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer}
.btn-ok-approve{background:var(--approve);color:#fff}
.btn-ok-reject{background:var(--reject);color:#fff}
.btn-cancel{background:#eef2f8;color:var(--muted)}
@media(max-width:500px){
  .action-btns{flex-direction:column}
  .role-banner{padding:14px;gap:10px}
  .role-banner h2{font-size:16px}
  .user-pill{max-width:130px;font-size:11px}
}
</style>
</head>
<body>
<header>
  <div class="logo">承</div>
  <h1>押なつ申請ワークフロー</h1>
  <a class="btn-manual" href="https://drive.google.com/drive/folders/1jEbOVN9bt3AQUOzIMAhV_xeU7zJz7S34" target="_blank">📖 利用マニュアル</a>
  <div class="user-pill"><?= userEmail ?></div>
</header>
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">申請データを読み込み中...</div>
</div>
<div id="errorArea" style="display:none"></div>
<div class="page" id="mainContent">
  <div class="role-banner" id="roleBanner">
    <div class="icon-box" id="roleIcon"></div>
    <div><h2 id="roleTitle"></h2><p id="roleDesc"></p></div>
  </div>
  <div class="status-bar">
    <div class="step" id="s1"><div class="step-dot">1</div><div class="step-label">申請</div><div class="step-date" id="s1d"></div></div>
    <div class="step" id="s2"><div class="step-dot">2</div><div class="step-label">GM承認</div><div class="step-date" id="s2d"></div></div>
    <div class="step" id="s3"><div class="step-dot">3</div><div class="step-label">部長承認</div><div class="step-date" id="s3d"></div></div>
    <div class="step" id="s4"><div class="step-dot">✓</div><div class="step-label">完了</div></div>
  </div>
  <div class="card">
    <div class="card-head">📋 申請内容</div>
    <table class="detail-table" id="detailTable"></table>
  </div>
  <div class="action-card" id="actionArea">
    <h3>🖊 コメント（否決の場合は理由を必須入力）</h3>
    <textarea class="comment" id="commentField" placeholder="コメントがあれば入力してください" oninput="autoResize(this)"></textarea>
    <div class="action-btns">
      <button class="btn-approve" id="btnApprove" onclick="confirmAction('approve')">✅ 承認する</button>
      <button class="btn-reject" id="btnReject" onclick="confirmAction('reject')">❌ 否決する</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="confirmModal"><div class="modal">
  <div class="icon" id="cIcon"></div><h3 id="cTitle"></h3><p id="cDesc"></p>
  <div class="modal-btns"><button class="btn btn-cancel" onclick="closeConfirm()">キャンセル</button><button class="btn" id="btnOk" onclick="executeAction()"></button></div>
</div></div>
<div class="loading-overlay hidden" id="processingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">処理中...</div>
</div>
<div class="modal-overlay" id="resultModal"><div class="modal">
  <div class="icon" id="rIcon"></div><h3 id="rTitle"></h3><p id="rDesc"></p>
  <div class="modal-btns"><button class="btn btn-cancel" onclick="document.getElementById('resultModal').classList.remove('show')">閉じる</button></div>
</div></div>

<script>
var ROW=<?= row ?>, TOKEN='<?= token ?>', ROLE='<?= role ?>', HONBU='<?= honbu ?>';
var FD=null, pendingDecision=null;

function autoResize(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}

(function fetchData(){
  google.script.run.withSuccessHandler(function(res){
    document.getElementById('loadingOverlay').classList.add('hidden');
    if(!res||!res.success){showError(res?res.message:'データの取得に失敗しました。');return;}
    FD=res.data; renderPage();
  }).withFailureHandler(function(err){
    document.getElementById('loadingOverlay').classList.add('hidden');
    showError('サーバーエラー: '+(err.message||'不明なエラー'));
  }).getApprovalData(ROW,TOKEN,ROLE,HONBU);
})();

function showError(msg){var el=document.getElementById('errorArea');el.style.display='block';el.innerHTML='<div class="error-box"><div class="icon">⚠️</div><h2>エラー</h2><p>'+escHtml(msg)+'</p></div>';}

function renderPage(){
  document.getElementById('mainContent').style.display='block';
  var banner=document.getElementById('roleBanner'); banner.classList.add(ROLE);
  if(ROLE==='gm'){document.getElementById('roleIcon').textContent='👔';document.getElementById('roleTitle').textContent='GM 承認依頼';document.getElementById('roleDesc').textContent='GMとして申請内容をご確認の上、承認または否決を行ってください。';}
  else{document.getElementById('roleIcon').textContent='🏢';document.getElementById('roleTitle').textContent='部長 承認依頼（GM承認済）';document.getElementById('roleDesc').textContent='部長として申請内容をご確認の上、承認または否決を行ってください。';}
  document.getElementById('s1').classList.add('done'); setText('s1d',FD.requestDate);
  if(ROLE==='gm'){document.getElementById('s2').classList.add('current');}
  else{document.getElementById('s2').classList.add('done');setText('s2d',FD.gmApproveDate);document.getElementById('s3').classList.add('current');}

  var typeDisp='';
  if(FD.E) typeDisp=String(FD.E).split(',').map(function(s){return escHtml(s.trim());}).filter(Boolean).join('<br>');
  var qtyDisp='';
  if(FD.G) qtyDisp=String(FD.G).split(',').map(function(s){return escHtml(s.trim());}).filter(Boolean).join('<br>');

  var fields=[
    {label:'押なつ番号',value:FD.A},{label:'記番号',value:FD.C},{label:'件名',value:FD.D},
    {label:'種類',value:null,html:typeDisp},{label:'部数',value:null,html:qtyDisp},{label:'あて先',value:FD.F},
    {label:'本部',value:FD.honbu||HONBU},{label:'所属',value:FD.I},{label:'氏名',value:FD.J},
    {label:'GM',value:FD.K},{label:'部長',value:FD.L},{label:'依頼日時',value:FD.requestDate}
  ];
  if(ROLE==='bucho') fields.push({label:'GM承認日時',value:FD.gmApproveDate});

  var html='';
  for(var i=0;i<fields.length;i++){
    var f=fields[i];
    var td=(f.html!==undefined&&f.html!==null)?f.html:escHtml(String(f.value!=null?f.value:''));
    html+='<tr><td>'+f.label+'</td><td>'+td+'</td></tr>';
  }
  document.getElementById('detailTable').innerHTML=html;
}

function confirmAction(d){
  var c=document.getElementById('commentField').value.trim();
  if(d==='reject'&&!c){alert('否決する場合はコメント欄に理由を入力してください。');return;}
  pendingDecision=d; var next=ROLE==='gm'?'部長':'申請者';
  if(d==='approve'){setText('cIcon','✅');setText('cTitle','承認してよろしいですか？');setText('cDesc','承認すると '+next+' にメールが送信されます。');document.getElementById('btnOk').textContent='承認する';document.getElementById('btnOk').className='btn btn-ok-approve';}
  else{setText('cIcon','❌');setText('cTitle','否決してよろしいですか？');setText('cDesc','否決すると申請者に否決通知メールが送信されます。');document.getElementById('btnOk').textContent='否決する';document.getElementById('btnOk').className='btn btn-ok-reject';}
  document.getElementById('confirmModal').classList.add('show');
}
function closeConfirm(){document.getElementById('confirmModal').classList.remove('show');}
function executeAction(){
  var d=pendingDecision;pendingDecision=null;closeConfirm();if(!d)return;
  var c=document.getElementById('commentField').value.trim();
  var bA=document.getElementById('btnApprove'),bR=document.getElementById('btnReject');
  var overlay=document.getElementById('processingOverlay');
  bA.classList.add('loading');bR.classList.add('loading');
  overlay.classList.remove('hidden');
  google.script.run.withSuccessHandler(function(r){
    overlay.classList.add('hidden');
    bA.classList.remove('loading');bR.classList.remove('loading');
    showResult(r.success?(d==='approve'?'✅':'❌'):'⚠️',r.success?(d==='approve'?'処理完了':'否決完了'):'エラー',r.message);
    if(r.success){var a=document.getElementById('actionArea');a.style.opacity='.4';a.style.pointerEvents='none';}
  }).withFailureHandler(function(err){overlay.classList.add('hidden');bA.classList.remove('loading');bR.classList.remove('loading');showResult('⚠️','エラー',err.message||'処理に失敗しました。');}).processApproval(ROW,TOKEN,ROLE,HONBU,d,c);
}
function showResult(i,t,m){setText('rIcon',i);setText('rTitle',t);setText('rDesc',m);document.getElementById('resultModal').classList.add('show');}
function setText(id,t){var e=document.getElementById(id);if(e)e.textContent=t||'';}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
