function initTimeSelects(){
  var opts='<option value="">--:--</option>';
  for(var h=0;h<24;h++){for(var m=0;m<60;m+=10){
    var v=('0'+h).slice(-2)+':'+('0'+m).slice(-2);
    opts+='<option value="'+v+'">'+v+'</option>';
  }}
  document.getElementById('mf_startTime').innerHTML=opts;
  document.getElementById('mf_endTime').innerHTML=opts;
}

// 件名textareaの自動リサイズ
function autoResizeKenmei(){
  document.querySelectorAll('.kenmei-field').forEach(function(ta){
    ta.style.height='auto';

}

function showPage(id){document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});document.getElementById(id).classList.add('active');setTimeout(autoResizeKenmei,50);}
function updateBreadcrumb(items){
  var bc=document.getElementById('breadcrumb');
  var h='<a href="javascript:void(0)" onclick="showTopPage()">トップ</a>';
  items.forEach(function(item,i){h+='<span class="separator">›</span>';
    if(i<items.length-1&&item.onclick)h+='<a href="javascript:void(0)" onclick="'+item.onclick+'">'+item.label+'</a>';
    else h+='<span class="current">'+item.label+'</span>';});
  bc.innerHTML=h;
}

function renderHonbuGrid(structure){

  var hI={'土木本部':'construction','ジオフロント本部':'landscape'};
  ['土木本部','ジオフロント本部'].forEach(function(honbu){
    var depts=structure[honbu];if(!depts)return;
    html+='<div class="honbu-card"><div class="honbu-card-header"><span class="material-icons">'+(hI[honbu]||'business')+'</span><h3>'+honbu+'</h3></div><div class="dept-list">';
    depts.forEach(function(dept){
      var di=DEPT_ICONS[dept]||{icon:'folder_open',css:''};
      html+='<div class="dept-item" onclick="openDepartment(\''+esc(honbu)+'\',\''+esc(dept)+'\')">';

      if(di.custom){
        html+='<span class="dept-custom-icon '+di.css+'">'+di.custom+'</span>';
      } else if(di.sym){
        html+='<span class="material-symbols-outlined '+di.css+'">'+di.icon+'</span>';
      } else {
        html+='<span class="material-icons '+di.css+'">'+di.icon+'</span>';
      }
      html+='<span class="dept-item-name">'+escH(dept)+'</span></div>';
      html+='<span class="material-icons arrow">chevron_right</span></div>';
    });html+='</div></div>';
  });grid.innerHTML=html;
}

function renderDepartment(result){
  showPage('page-department');
  updateBreadcrumb([{label:currentHonbu},{label:result.department}]);
  document.getElementById('deptTitle').textContent=result.department;
  document.getElementById('deptBadge').textContent=result.data.length+'件';
  var tbody=document.getElementById('progressBody'),nd=document.getElementById('noDataMsg');
  if(!result.data||!result.data.length){tbody.innerHTML='';nd.style.display='flex';return;}
  nd.style.display='none';
  var html='';
  result.data.forEach(function(row){
    var d=row.detail||{};var amt=row.juchuAmount?Number(row.juchuAmount).toLocaleString():'';
    html+='<tr>';
    html+='<td class="sc sc0">'+escH(String(row.no||''))+'</td>';
    html+='<td class="sc sc1">'+escH(row.code||'')+'</td>';
    html+='<td class="sc sc2 col-kenmei"><a class="kenmei-link" data-row="'+encodeURIComponent(JSON.stringify(row))+'">'+escH(row.kenmeiName||'')+'</a>';
    if(row.commentStatus==='未確認') html+='<span class="comment-badge" data-row="'+encodeURIComponent(JSON.stringify(row))+'" title="品管コメントあり">💬</span>';
    html+='</td>';
    html+='<td>'+escH(row.kikiStart||'')+'</td><td>'+escH(row.kikiEnd||'')+'</td>';
    html+='<td class="amount-cell">'+amt+'</td><td>'+escH(row.contractor||'')+'</td>';
    TABLE_COLS.forEach(function(col){
      var val=d[col.k]||'';var cls=col.s?' class="gsep"':'';
      if(col.k==='gijiroku_no'){
        html+='<td'+cls+'><a class="giji-link" data-row="'+encodeURIComponent(JSON.stringify(row))+'">'+(val||'—')+'</a></td>';
      } else {
        html+='<td'+cls+'>'+escH(String(val))+'</td>';
      }
    });
    html+='</tr>';
  });
  tbody.innerHTML=html;
  tbody.querySelectorAll('.kenmei-link').forEach(function(el){
    el.addEventListener('click',function(){openProjectDetail(JSON.parse(decodeURIComponent(this.getAttribute('data-row'))));});
  });
  tbody.querySelectorAll('.giji-link').forEach(function(el){
    el.addEventListener('click',function(e){e.stopPropagation();openMinutesListForProject(JSON.parse(decodeURIComponent(this.getAttribute('data-row'))));});
  });
  tbody.querySelectorAll('.comment-badge').forEach(function(el){
    el.addEventListener('click',function(e){e.stopPropagation();var proj=JSON.parse(decodeURIComponent(this.getAttribute('data-row')));openProjectDetail(proj);});
  });
}

// ===== プロジェクト詳細 =====
function openProjectDetail(project){
  currentProject=project;showLoading('詳細読み込み中...');
  function loadDetail(ssId){
    currentProject.projectSSId=ssId;
    var pbDone=false,gtDone=false,pbData=null,gtData=null;
    function done(){if(!pbDone||!gtDone)return;hideLoading();renderProjectDetail(pbData,gtData);}
    if(phoneBookCache[currentDepartment]){pbData=phoneBookCache[currentDepartment];pbDone=true;}
    else{google.script.run.withSuccessHandler(function(r2){pbData=r2;phoneBookCache[currentDepartment]=r2;pbDone=true;done();}).withFailureHandler(function(){pbData={groups:[],staff:[],approvers:[]};pbDone=true;done();}).getPhoneBookData(currentDepartment);}
    google.script.run.withSuccessHandler(function(r3){gtData=r3;gtDone=true;done();}).withFailureHandler(function(){gtData={};gtDone=true;done();}).getGroupTaisei(ssId);
    if(pbDone&&gtDone)done();
  }
  if(project.projectSSId){
    loadDetail(project.projectSSId);
  } else {
    google.script.run.withSuccessHandler(function(r){
      if(r.error){hideLoading();showToast(r.error,'error');return;}
      loadDetail(r.ssId);
    }).withFailureHandler(function(e){hideLoading();showToast(e.message,'error');}).ensureProjectSS(currentDepartment,project.rowIndex,project.code,project.kenmeiName);
  }
}

function renderProjectDetail(phoneData,groupData){
  detailPhoneData=phoneData; detailGroupData=groupData;
  showPage('page-detail');
  var p=currentProject;
  updateBreadcrumb([{label:currentHonbu},{label:currentDepartment,onclick:"openDepartment('"+esc(currentHonbu)+"','"+esc(currentDepartment)+"')"},{label:p.kenmeiName||'詳細'}]);
  document.getElementById('detailTitle').textContent=p.kenmeiName||'';
  var m='<span class="detail-meta-item"><span class="material-icons">badge</span>'+escH(p.code||'')+'</span>';
  m+='<span class="detail-meta-item"><span class="material-icons">date_range</span>'+escH(p.kikiStart||'')+' ～ '+escH(p.kikiEnd||'')+'</span>';
  if(p.juchuAmount)m+='<span class="detail-meta-item"><span class="material-icons">payments</span>'+Number(p.juchuAmount).toLocaleString()+'千円</span>';
  m+='<span class="detail-meta-item"><span class="material-icons">business</span>'+escH(p.contractor||'')+'</span>';
  document.getElementById('detailMeta').innerHTML=m;

  var detail=p.detail||{};
  if(groupData){['group','tanto','jisshi','shinsa','approver','tokki'].forEach(function(k){if(groupData[k])detail[k]=groupData[k];});}
  p.detail=detail;

  // ===== フロー図生成 =====
  renderFlowDiagram();

  // ===== 帳票一覧（フェーズ別）=====
  renderFormPhaseGrid();

  switchDetailTab('flow1');
}

// ===== タブ切替 =====
function switchDetailTab(tab){
  var tabs=['flow1','flow2','flow3','forms'];
  document.querySelectorAll('.detail-tab').forEach(function(t,i){t.classList.toggle('active',tabs[i]===tab);});
  tabs.forEach(function(t){
    var el=document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1));
    if(el) el.style.display=(t===tab)?'block':'none';
  });
  document.getElementById('tabForms').style.display=tab==='forms'?'block':'none';
}

// ===== フロー図（SVGデフォルト）=====
function renderDefaultFlow_inner(){
  var phases=QMS_PHASES;
  var W=920,nodeH=38,phaseGap=16,phaseW=860,padL=30,padT=20;
  var y=padT;
  var svg='<svg viewBox="0 0 '+W+' SVGH" xmlns="http://www.w3.org/2000/svg" style="width:100%;font-family:sans-serif;">';
  // 背景
  svg+='<rect width="'+W+'" height="SVGH" rx="12" fill="#f8fafc"/>';

  phases.forEach(function(ph,pi){
    var forms=FORM_REGISTRY.filter(function(f){return f.phase===ph.id;});
    var rows=Math.ceil(forms.length/3);
    var phH=44+rows*(nodeH+8)+16;

    // フェーズボックス
    svg+='<rect x="'+padL+'" y="'+y+'" width="'+phaseW+'" height="'+phH+'" rx="8" fill="#fff" stroke="'+ph.color+'" stroke-width="2"/>';
    // フェーズヘッダー
    svg+='<rect x="'+padL+'" y="'+y+'" width="'+phaseW+'" height="36" rx="8" fill="'+ph.color+'"/>';
    svg+='<rect x="'+padL+'" y="'+(y+28)+'" width="'+phaseW+'" height="8" fill="'+ph.color+'"/>';
    svg+='<text x="'+(padL+16)+'" y="'+(y+24)+'" fill="#fff" font-size="14" font-weight="700">'+ph.title+'</text>';

    // フォームノード（3列グリッド）
    var ny=y+48;
    forms.forEach(function(f,fi){
      var col=fi%3, row=Math.floor(fi/3);
      var nx=padL+16+col*280;
      var fy=ny+row*(nodeH+8);
      var isImpl=(f.action!=='stub');
      var fill=isImpl?ph.color+'20':'#f0f0f0';
      var stroke=isImpl?ph.color:'#ccc';
      var txtColor=isImpl?'#1a1a2e':'#999';
      var cursor=isImpl?'pointer':'default';
      svg+='<g onclick="openFormById(\''+f.id+'\')" style="cursor:'+cursor+';">';
      svg+='<rect x="'+nx+'" y="'+fy+'" width="260" height="'+nodeH+'" rx="6" fill="'+fill+'" stroke="'+stroke+'" stroke-width="1.5"/>';
      svg+='<text x="'+(nx+12)+'" y="'+(fy+24)+'" fill="'+txtColor+'" font-size="12" font-weight="'+(isImpl?'600':'400')+'">'+(isImpl?'● ':'○ ')+escH(f.title)+'</text>';
      if(!isImpl) svg+='<text x="'+(nx+240)+'" y="'+(fy+24)+'" fill="#bbb" font-size="9" text-anchor="end">準備中</text>';
      svg+='</g>';
    });

    y+=phH+phaseGap;

    // フェーズ間矢印
    if(pi<phases.length-1){
      var arrowX=padL+phaseW/2;
      svg+='<line x1="'+arrowX+'" y1="'+(y-phaseGap)+'" x2="'+arrowX+'" y2="'+y+'" stroke="#bbb" stroke-width="2" marker-end="url(#arrowhead)"/>';
    }
  });

  // 矢印マーカー定義
  svg='<svg viewBox="0 0 '+W+' '+(y+10)+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;font-family:sans-serif;">'
    +'<defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#bbb"/></marker></defs>'
    +'<rect width="'+W+'" height="'+(y+10)+'" rx="12" fill="#f8fafc"/>'
    +svg.split('<rect width="'+W+'" height="SVGH" rx="12" fill="#f8fafc"/>')[1];

  document.getElementById('flowContainer1').innerHTML=svg;
}

function collectInspectionData(formId){
  var def=INSPECTION_DEFS[formId];
  var data={
    code:gv('ins_code'),kenmei:gv('ins_kenmei'),date:gv('ins_date'),no:gv('ins_no'),
    participants:gv('ins_participants'),reviewer:gv('ins_reviewer'),
    pass:document.getElementById('ins_pass').checked?'YES':'',
    mat_other:gv('ins_mat_other')
  };
  if(formId==='itaku_kensa') data.company=gv('ins_company');
  // 資料チェック
  var mats=[];
  def.materials.forEach(function(m,i){if(document.getElementById('ins_mat_'+i).checked) mats.push(m);});
  data.materials=mats.join('|');
  // 指摘有無
  var su=document.querySelector('input[name="ins_shiteki_umu"]:checked');
  data.shiteki_umu=su?su.value:'';
  // 検査項目
  def.items.forEach(function(item){
    data['tgt_'+item.key]=document.getElementById('ins_tgt_'+item.key).checked?'■':'□';
    var sel=document.querySelector('input[name="ins_'+item.key+'"]:checked');
    data['res_'+item.key]=sel?sel.value:'';
    if(item.planName){var el=document.getElementById('ins_plan_'+item.key); data['plan_'+item.key]=el?el.value:'';}
  });
  // 指摘事項テーブル
  var rows=[];
  for(var r=0;r<3;r++){
    var rv=[];var has=false;
    for(var c=0;c<6;c++){var el=document.getElementById('ins_st_'+r+'_'+c);var v=el?el.value:'';rv.push(v);if(v)has=true;}
    if(has) rows.push(rv.join('|'));
  }
  data.shiteki_table=rows.join('\n');
  return data;
}

function saveInspectionForm(formId){
  if(!currentProject||!currentProject.projectSSId) return;
  var def=INSPECTION_DEFS[formId];
  var data=collectInspectionData(formId);
  showLoading('保存中...');
  google.script.run.withSuccessHandler(function(r){
    hideLoading();showToast(r.message,r.success?'success':'error');if(r.success) afterFormSaved();
  }).withFailureHandler(function(e){hideLoading();showToast(e.message,'error');
  }).saveGenericFormData(currentProject.projectSSId, def.sheetName, data);
}

function loadInspectionFormData(formId){
  if(!currentProject||!currentProject.projectSSId) return;
  var def=INSPECTION_DEFS[formId];
  google.script.run.withSuccessHandler(function(data){
    if(!data) return;
    ['code','kenmei','date','no','participants','reviewer','mat_other'].forEach(function(k){
      var el=document.getElementById('ins_'+k);if(el&&data[k]) el.value=data[k];
    });
    if(formId==='itaku_kensa'&&data.company){var el=document.getElementById('ins_company');if(el) el.value=data.company;}
    if(data.pass==='YES') document.getElementById('ins_pass').checked=true;
    if(data.materials){
      data.materials.split('|').forEach(function(m){
        def.materials.forEach(function(dm,i){if(dm===m) document.getElementById('ins_mat_'+i).checked=true;});
      });
    }
    if(data.shiteki_umu){
      document.querySelectorAll('input[name="ins_shiteki_umu"]').forEach(function(r){if(r.value===data.shiteki_umu) r.checked=true;});
    }
    def.items.forEach(function(item){
      if(data['tgt_'+item.key]==='■') document.getElementById('ins_tgt_'+item.key).checked=true;
      if(data['res_'+item.key]){
        document.querySelectorAll('input[name="ins_'+item.key+'"]').forEach(function(r){if(r.value===data['res_'+item.key]) r.checked=true;});
      }
      if(item.planName&&data['plan_'+item.key]){var el=document.getElementById('ins_plan_'+item.key);if(el) el.value=data['plan_'+item.key];}
    });
    if(data.shiteki_table){
      data.shiteki_table.split('\n').forEach(function(rs,r){
        rs.split('|').forEach(function(v,c){var el=document.getElementById('ins_st_'+r+'_'+c);if(el) el.value=v;});
      });
    }
  }).getGenericFormData(currentProject.projectSSId, def.sheetName);
}

function collectDatouseiData(){
  var data={code:gv('dt_code'),kenmei:gv('dt_kenmei'),date:gv('dt_date'),participants:gv('dt_participants')};
  // 資料
  var mats=[];
  ['仕様書','品質計画書','実施計画書','設計業務依頼票','委託関連記録','成果品（案）','委託成果品検査記録','設計検査記録','工程内検査記録','議事録','その他'].forEach(function(m,i){
    if(document.getElementById('dt_mat_'+i).checked) mats.push(m);
  });
  data.materials=mats.join('|');
  // Q1
  var q1=document.querySelector('input[name="dt_q1"]:checked'); data.q1=q1?q1.value:'';
  // 検査確認
  ['dt_k1','dt_k2','dt_k3','dt_k4','dt_k5','dt_k6'].forEach(function(k){
    var chkEl=document.getElementById(k+'_chk');data[k+'_chk']=chkEl&&chkEl.checked?'■':'□';
    var sel=document.querySelector('input[name="'+k+'"]:checked'); data[k]=sel?sel.value:'';
    var ne=document.getElementById(k+'_name'); if(ne) data[k+'_name']=ne.value;
  });
  // 貸与品
  var g=document.querySelector('input[name="dt_goods"]:checked'); data.goods=g?g.value:'';
  var goodsActions=[];for(var ga=0;ga<4;ga++){var gel=document.getElementById('dt_goods_a_'+ga);if(gel&&gel.checked)goodsActions.push(ga);}
  data.goods_actions=goodsActions.join('|');data.goods_detail=gv('dt_goods_detail');
  // 廃棄物
  var w=document.querySelector('input[name="dt_waste"]:checked'); data.waste=w?w.value:'';
  data.waste_detail=gv('dt_waste_detail');
  // リスク
  ['dt_r1','dt_r2','dt_r3','dt_r4'].forEach(function(k){data[k]=gv(k);var umu=document.querySelector('input[name="'+k+'_umu"]:checked');data[k+'_umu']=umu?umu.value:'';});
  data.pass=document.getElementById('dt_pass').checked?'YES':'';
  data.reviewer=gv('dt_reviewer');
  return data;
}

function saveDatouseiForm(){
  if(!currentProject||!currentProject.projectSSId) return;
  showLoading('保存中...');
  google.script.run.withSuccessHandler(function(r){
    hideLoading();showToast(r.message,r.success?'success':'error');if(r.success) afterFormSaved();
  }).withFailureHandler(function(e){hideLoading();showToast(e.message,'error');
  }).saveGenericFormData(currentProject.projectSSId,'妥当性確認記録',collectDatouseiData());
}

function loadDatouseiFormData(){
  if(!currentProject||!currentProject.projectSSId) return;
  google.script.run.withSuccessHandler(function(data){
    if(!data) return;
    ['code','kenmei','date','participants'].forEach(function(k){var el=document.getElementById('dt_'+k);if(el&&data[k]) el.value=data[k];});
    if(data.materials) data.materials.split('|').forEach(function(m){
      ['仕様書','品質計画書','実施計画書','設計業務依頼票','委託関連記録','成果品（案）','委託成果品検査記録','設計検査記録','工程内検査記録','議事録','その他'].forEach(function(dm,i){if(dm===m) document.getElementById('dt_mat_'+i).checked=true;});
    });
    if(data.q1) document.querySelectorAll('input[name="dt_q1"]').forEach(function(r){if(r.value===data.q1) r.checked=true;});
    ['dt_k1','dt_k2','dt_k3','dt_k4','dt_k5','dt_k6'].forEach(function(k){
      var chkEl=document.getElementById(k+'_chk');if(chkEl&&data[k+'_chk']==='■') chkEl.checked=true;
      if(data[k]) document.querySelectorAll('input[name="'+k+'"]').forEach(function(r){if(r.value===data[k]) r.checked=true;});
      var ne=document.getElementById(k+'_name'); if(ne&&data[k+'_name']) ne.value=data[k+'_name'];
    });
    if(data.goods) document.querySelectorAll('input[name="dt_goods"]').forEach(function(r){if(r.value===data.goods) r.checked=true;});
    if(data.goods_actions){data.goods_actions.split('|').forEach(function(ga){var gel=document.getElementById('dt_goods_a_'+ga);if(gel)gel.checked=true;});}
    if(data.goods_detail){var el2=document.getElementById('dt_goods_detail');if(el2) el2.value=data.goods_detail;}
    if(data.waste) document.querySelectorAll('input[name="dt_waste"]').forEach(function(r){if(r.value===data.waste) r.checked=true;});
    if(data.waste_detail){var el3=document.getElementById('dt_waste_detail');if(el3) el3.value=data.waste_detail;}
    ['dt_r1','dt_r2','dt_r3','dt_r4'].forEach(function(k){var el=document.getElementById(k);if(el&&data[k]) el.value=data[k];if(data[k+'_umu'])document.querySelectorAll('input[name="'+k+'_umu"]').forEach(function(r){if(r.value===data[k+'_umu'])r.checked=true;});});
    if(data.pass==='YES') document.getElementById('dt_pass').checked=true;
    if(data.reviewer) setVal('dt_reviewer',data.reviewer);
  }).getGenericFormData(currentProject.projectSSId,'妥当性確認記録');
}

function saveHinshitsuForm(){
  if(!currentProject||!currentProject.projectSSId) return;
  var data={no:gv('hp_no'),code:gv('hp_code'),kenmei:gv('hp_kenmei'),customer:gv('hp_customer'),
    period_from:gv('hp_period_from'),period_to:gv('hp_period_to'),gyomu_kosei:gv('hp_gyomu_kosei'),
    taisei:gv('hp_taisei'),sp_reason:gv('hp_sp_reason'),approver:gv('hp_approver'),reviewer:gv('hp_reviewer'),
    responsible:gv('hp_responsible'),member:gv('hp_member'),plan_detail:gv('hp_plan_detail'),
    prog_name:gv('hp_prog_name'),law_name:gv('hp_law_name'),std_name:gv('hp_std_name')};
  ['prog','law','std','map','map_src','privacy','privacy_check'].forEach(function(k){
    var sel=document.querySelector('input[name="hp_'+k+'"]:checked'); data[k]=sel?sel.value:'';
  });
  // テーブル
  var iraiRows=[],itakuRows=[];
  for(var i=0;i<3;i++){iraiRows.push([gv('hp_irai_'+i+'_0'),gv('hp_irai_'+i+'_1')].join('|'));}
  for(var j=0;j<3;j++){
    var cols=[];for(var c=0;c<5;c++) cols.push(gv('hp_itaku_'+j+'_'+c));
    itakuRows.push(cols.join('|'));
  }
  data.irai_table=iraiRows.join('\n');
  data.itaku_table=itakuRows.join('\n');
  // リスク管理テーブル
  for(var ph=0;ph<3;ph++){var rmax=ph===0?3:ph===1?5:7;var rows=[];
    for(var ri=0;ri<rmax;ri++){var cols=[];for(var rc=0;rc<6;rc++) cols.push(gv('hp_risk'+ph+'_'+ri+'_'+rc));rows.push(cols.join('|'));}
    data['risk'+ph+'_table']=rows.join('\n');}
  data.apv_creator=gv('hp_apv_creator');
  data.change_reason=gv('hp_change_reason');
  // 進捗管理テーブル
  var progRows=[];for(var pi=0;pi<4;pi++){var pcols=[];for(var pc=0;pc<4;pc++) pcols.push(gv('hp_prog_'+pi+'_'+pc));progRows.push(pcols.join('|'));}
  data.progress_table=progRows.join('\n');
  showLoading('保存中...');
  google.script.run.withSuccessHandler(function(r){hideLoading();showToast(r.message,r.success?'success':'error');if(r.success) afterFormSaved();
  }).withFailureHandler(function(e){hideLoading();showToast(e.message,'error');
  }).saveGenericFormData(currentProject.projectSSId,'品質計画書',data);
}
function loadHinshitsuData(){
  if(!currentProject||!currentProject.projectSSId) return;
  google.script.run.withSuccessHandler(function(d){
    if(!d) return;
    ['no','code','kenmei','customer','period_from','period_to','gyomu_kosei','taisei','sp_reason','approver','reviewer','responsible','member','plan_detail','prog_name','law_name','std_name'].forEach(function(k){
      var el=document.getElementById('hp_'+k);if(el&&d[k]) el.value=d[k];
    });
    if(d.taisei==='特別体制') document.getElementById('hp_sp_area').style.display='block';
    ['prog','law','std','map','map_src','privacy','privacy_check'].forEach(function(k){
      if(d[k]) document.querySelectorAll('input[name="hp_'+k+'"]').forEach(function(r){if(r.value===d[k]) r.checked=true;});
    });
    if(d.irai_table){d.irai_table.split('\n').forEach(function(rs,i){rs.split('|').forEach(function(v,c){var el=document.getElementById('hp_irai_'+i+'_'+c);if(el) el.value=v;});});}
    if(d.itaku_table){d.itaku_table.split('\n').forEach(function(rs,j){rs.split('|').forEach(function(v,c){var el=document.getElementById('hp_itaku_'+j+'_'+c);if(el) el.value=v;});});}
    for(var ph=0;ph<3;ph++){if(d['risk'+ph+'_table']){d['risk'+ph+'_table'].split('\n').forEach(function(rs,ri){rs.split('|').forEach(function(v,rc){var el=document.getElementById('hp_risk'+ph+'_'+ri+'_'+rc);if(el&&v) el.value=v;});});}}
    if(d.apv_creator) setVal('hp_apv_creator',d.apv_creator);
    if(d.change_reason) setVal('hp_change_reason',d.change_reason);
    if(d.progress_table){d.progress_table.split('\n').forEach(function(rs,pi){rs.split('|').forEach(function(v,pc){var el=document.getElementById('hp_prog_'+pi+'_'+pc);if(el&&v) el.value=v;});});}
  }).getGenericFormData(currentProject.projectSSId,'品質計画書');
}

function saveHinshitsuTokuteiForm(){
  if(!currentProject||!currentProject.projectSSId) return;
  var data={no:gv('ht_no'),code:gv('ht_code'),kenmei:gv('ht_kenmei'),customer:gv('ht_customer'),
    period_from:gv('ht_period_from'),period_to:gv('ht_period_to'),gyomu_kosei:gv('ht_gyomu_kosei'),
    approver:gv('ht_approver'),reviewer:gv('ht_reviewer'),responsible:gv('ht_responsible'),
    member:gv('ht_member'),plan_detail:gv('ht_plan_detail'),prog_name:gv('ht_prog_name'),
    law_name:gv('ht_law_name'),std_name:gv('ht_std_name'),change_reason:gv('ht_change_reason')};
  ['prog','law','std','map','privacy','privacy_check'].forEach(function(k){var s=document.querySelector('input[name="ht_'+k+'"]:checked'); data[k]=s?s.value:'';});
  var iraiRows=[];for(var i=0;i<3;i++){iraiRows.push([gv('ht_irai_'+i+'_0'),gv('ht_irai_'+i+'_1')].join('|'));}
  data.irai_table=iraiRows.join('\n');
  var itakuRows=[];for(var j=0;j<2;j++){var cols=[];for(var c=0;c<5;c++)cols.push(gv('ht_itaku_'+j+'_'+c));itakuRows.push(cols.join('|'));}
  data.itaku_table=itakuRows.join('\n');
  ['pre','start','exec'].forEach(function(stage){
    var maxItems=stage==='pre'?10:(stage==='start'?5:7);
    var rows=[];for(var idx=0;idx<maxItems;idx++){rows.push([gv('ht_'+stage+'_'+idx+'_s'),gv('ht_'+stage+'_'+idx+'_u'),gv('ht_'+stage+'_'+idx+'_t'),gv('ht_'+stage+'_'+idx+'_g')].join('|'));}
    data['risk_'+stage]=rows.join('\n');
  });
  data.apv_creator=gv('ht_apv_creator');
  showLoading('保存中...');
  google.script.run.withSuccessHandler(function(r){hideLoading();showToast(r.message,r.success?'success':'error');
  }).withFailureHandler(function(e){hideLoading();showToast(e.message,'error');
  }).saveGenericFormData(currentProject.projectSSId,'特定業務品質計画書',data);
}
function loadHinshitsuTokuteiData(){
  if(!currentProject||!currentProject.projectSSId) return;
  google.script.run.withSuccessHandler(function(d){
    if(!d) return;
    ['no','code','kenmei','customer','period_from','period_to','gyomu_kosei','approver','reviewer','responsible','member','plan_detail','prog_name','law_name','std_name','change_reason'].forEach(function(k){
      var el=document.getElementById('ht_'+k);if(el&&d[k]) el.value=d[k];
    });
    ['prog','law','std','map','privacy','privacy_check'].forEach(function(k){
      if(d[k]) document.querySelectorAll('input[name="ht_'+k+'"]').forEach(function(r){if(r.value===d[k]) r.checked=true;});
    });
    if(d.irai_table){d.irai_table.split('\n').forEach(function(rs,i){rs.split('|').forEach(function(v,c){var el=document.getElementById('ht_irai_'+i+'_'+c);if(el) el.value=v;});});}
    if(d.itaku_table){d.itaku_table.split('\n').forEach(function(rs,j){rs.split('|').forEach(function(v,c){var el=document.getElementById('ht_itaku_'+j+'_'+c);if(el) el.value=v;});});}
    ['pre','start','exec'].forEach(function(stage){
      if(d['risk_'+stage]){d['risk_'+stage].split('\n').forEach(function(rs,idx){
        var parts=rs.split('|');
        ['s','u','t','g'].forEach(function(f,fi){var el=document.getElementById('ht_'+stage+'_'+idx+'_'+f);if(el&&parts[fi]) el.value=parts[fi];});
      });}
    });
    if(d.apv_creator) setVal('ht_apv_creator',d.apv_creator);
  }).getGenericFormData(currentProject.projectSSId,'特定業務品質計画書');
}

// ===== リスク評価シートフォーム =====
function reRiskScore(prefix,count){
  var score=0,total=count*3;
  for(var i=1;i<=count;i++){var sel=document.getElementById(prefix+i);
    if(sel&&sel.value){var v=sel.value;score+=(v==='◎'?3:v==='○'?2:v==='△'?1:0);}}
  return {score:score,total:total,rate:total>0?score/total:0};
}
function reRiskLevel(rate){
  if(rate>=0.8) return '評価率によるリスクは大です';
  if(rate>=0.5) return '評価率によるリスクは中です';
  if(rate>=0.2) return '評価率によるリスクは小です';
  if(rate>0) return '評価率によるリスクは極めて小です';
  return '';
}
function reUpdateCalc(){
  var s1=reRiskScore('re_s1_r',10);
  document.getElementById('re_s1_score').textContent=s1.score;
  document.getElementById('re_s1_total').textContent=s1.total;
  document.getElementById('re_s1_rate').textContent=s1.total>0?(s1.rate*100).toFixed(1)+'%':'';
  document.getElementById('re_s1_level').textContent=reRiskLevel(s1.rate);
  var s2a=reRiskScore('re_s2a_r',10);
  document.getElementById('re_s2a_score').textContent=s2a.score;
  document.getElementById('re_s2a_total').textContent=s2a.total;
  var s2b=reRiskScore('re_s2b_r',10);
  document.getElementById('re_s2b_score').textContent=s2b.score;
  document.getElementById('re_s2b_total').textContent=s2b.total;
  var s2score=s2a.score+s2b.score,s2total=s2a.total+s2b.total,s2rate=s2total>0?s2score/s2total:0;
  document.getElementById('re_s2_score').textContent=s2score;
  document.getElementById('re_s2_total').textContent=s2total;
  document.getElementById('re_s2_rate').textContent=s2total>0?(s2rate*100).toFixed(1)+'%':'';
  document.getElementById('re_s2_level').textContent=reRiskLevel(s2rate);
}

// 線描画（直線+折り曲げ+矢印回転）
function feRenderLines(svg,fd){var W=Math.max(svg.parentElement.scrollWidth,3200),H=Math.max(svg.parentElement.scrollHeight,4500);svg.setAttribute('viewBox','0 0 '+W+' '+H);svg.setAttribute('width',W);svg.setAttribute('height',H);var ps='';
(fd.lines||[]).forEach(function(ln,i){var from=fd.nodes[ln.from],to=fd.nodes[ln.to];if(!from||!to)return;var sel=(feSelected&&feSelected.type==='line'&&feSelected.idx===i);var sc=sel?'#e74c3c':(ln.color||'#555'),sw=sel?3:2;
var dashAttr='';if(ln.dash==='dashed')dashAttr=' stroke-dasharray="8,4"';else if(ln.dash==='dotted')dashAttr=' stroke-dasharray="3,3"';
var cp=calcConnPts(from,to),x1=cp.x1,y1=cp.y1,x2=cp.x2,y2=cp.y2;
var lastDx,lastDy;
if(ln.type==='elbowV'){ps+='<polyline points="'+x1+','+y1+' '+x1+','+y2+' '+x2+','+y2+'" fill="none" stroke="'+sc+'" stroke-width="'+sw+'"'+dashAttr+' data-lidx="'+i+'" class="fe-lp"/>';lastDx=x2-x1;lastDy=0;}
else if(ln.type==='elbowH'){ps+='<polyline points="'+x1+','+y1+' '+x2+','+y1+' '+x2+','+y2+'" fill="none" stroke="'+sc+'" stroke-width="'+sw+'"'+dashAttr+' data-lidx="'+i+'" class="fe-lp"/>';lastDx=0;lastDy=y2-y1;}
else if(ln.type==='elbow'){var mx=(x1+x2)/2,my=(y1+y2)/2;if(Math.abs(x2-x1)>Math.abs(y2-y1)){ps+='<polyline points="'+x1+','+y1+' '+x1+','+my+' '+x2+','+my+' '+x2+','+y2+'" fill="none" stroke="'+sc+'" stroke-width="'+sw+'"'+dashAttr+' data-lidx="'+i+'" class="fe-lp"/>';lastDx=0;lastDy=y2-my;}else{ps+='<polyline points="'+x1+','+y1+' '+mx+','+y1+' '+mx+','+y2+' '+x2+','+y2+'" fill="none" stroke="'+sc+'" stroke-width="'+sw+'"'+dashAttr+' data-lidx="'+i+'" class="fe-lp"/>';lastDx=x2-mx;lastDy=0;}}
else{ps+='<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+sc+'" stroke-width="'+sw+'"'+dashAttr+' data-lidx="'+i+'" class="fe-lp"/>';lastDx=x2-x1;lastDy=y2-y1;}
var ang=Math.atan2(lastDy,lastDx)*180/Math.PI;
ps+='<polygon points="-8,-5 0,0 -8,5" fill="'+sc+'" transform="translate('+x2+','+y2+') rotate('+ang+')"/>';
if(ln.label){var lmx=(x1+x2)/2,lmy=(y1+y2)/2;ps+='<text x="'+lmx+'" y="'+(lmy-6)+'" text-anchor="middle" fill="'+sc+'" font-size="11" font-weight="600">'+escH(ln.label)+'</text>';}});
svg.innerHTML=ps;svg.querySelectorAll('.fe-lp').forEach(function(p){p.style.cursor='pointer';p.addEventListener('click',function(e){e.stopPropagation();feSelected={type:'line',idx:parseInt(this.dataset.lidx)};feRender();});});}

function calcConnPts(a,b){var aw=a.w||180,ah=a.h||40,bw=b.w||180,bh=b.h||40;var ax=a.x+aw/2,ay=a.y+ah/2,bx=b.x+bw/2,by=b.y+bh/2;var dx=bx-ax,dy=by-ay;var x1,y1,x2,y2;
if(Math.abs(dx)/aw>Math.abs(dy)/ah){x1=dx>0?a.x+aw:a.x;y1=ay;}else{x1=ax;y1=dy>0?a.y+ah:a.y;}
if(Math.abs(dx)/bw>Math.abs(dy)/bh){x2=dx>0?b.x:b.x+bw;y2=by;}else{x2=bx;y2=dy>0?b.y:b.y+bh;}
return{x1:x1,y1:y1,x2:x2,y2:y2};}

// 件名詳細: 保存済みフロー表示(座標固定)
function renderFlowDiagramFromSaved(flowData, containerId){
  var fd;try{fd=typeof flowData==='string'?JSON.parse(flowData):flowData;}catch(e){return;}if(!fd)return;
  var cid=containerId||'flowContainer1';
  var container=document.getElementById(cid);if(!container)return;
  var nodes=fd.nodes||[],lines=fd.lines||[],tbs=fd.textboxes||[],sls=fd.swimlanes||[];
  if(!nodes.length&&!tbs.length&&!sls.length){container.innerHTML='<p style="color:var(--text-light);padding:20px;">フロー未設定</p>';return;}
  var maxX=100,maxY=100;
  nodes.forEach(function(n){maxX=Math.max(maxX,n.x+(n.w||180)+40);maxY=Math.max(maxY,n.y+(n.h||40)+60);});
  tbs.forEach(function(c){maxX=Math.max(maxX,c.x+(c.w||200)+40);maxY=Math.max(maxY,c.y+(c.h||60)+40);});
  sls.forEach(function(sl){maxX=Math.max(maxX,sl.x+sl.w+20);});
  var html='<div class="fe-view-wrap" style="position:relative;width:'+maxX+'px;height:'+maxY+'px;">';
  // スイムレーン
  sls.forEach(function(sl){html+='<div class="fe-view-swimlane" style="left:'+sl.x+'px;top:0;width:'+sl.w+'px;height:'+maxY+'px;background:'+(sl.color||'rgba(0,0,0,.015)')+';"><div class="fe-view-swimlane-label">'+escH(sl.label||'')+'</div></div>';});
  // SVG
  html+='<svg style="position:absolute;top:0;left:0;width:'+maxX+'px;height:'+maxY+'px;pointer-events:none;" viewBox="0 0 '+maxX+' '+maxY+'">';
  lines.forEach(function(ln){var from=nodes[ln.from],to=nodes[ln.to];if(!from||!to)return;var sc=ln.color||'#555';var cp=calcConnPts(from,to),x1=cp.x1,y1=cp.y1,x2=cp.x2,y2=cp.y2;var lastDx,lastDy;
    var dashAttr='';if(ln.dash==='dashed')dashAttr=' stroke-dasharray="8,4"';else if(ln.dash==='dotted')dashAttr=' stroke-dasharray="3,3"';
    if(ln.type==='elbowV'){html+='<polyline points="'+x1+','+y1+' '+x1+','+y2+' '+x2+','+y2+'" fill="none" stroke="'+sc+'" stroke-width="2"'+dashAttr+'/>';lastDx=x2-x1;lastDy=0;}
    else if(ln.type==='elbowH'){html+='<polyline points="'+x1+','+y1+' '+x2+','+y1+' '+x2+','+y2+'" fill="none" stroke="'+sc+'" stroke-width="2"'+dashAttr+'/>';lastDx=0;lastDy=y2-y1;}
    else if(ln.type==='elbow'){var mx=(x1+x2)/2,my=(y1+y2)/2;if(Math.abs(x2-x1)>Math.abs(y2-y1)){html+='<polyline points="'+x1+','+y1+' '+x1+','+my+' '+x2+','+my+' '+x2+','+y2+'" fill="none" stroke="'+sc+'" stroke-width="2"'+dashAttr+'/>';lastDx=0;lastDy=y2-my;}else{html+='<polyline points="'+x1+','+y1+' '+mx+','+y1+' '+mx+','+y2+' '+x2+','+y2+'" fill="none" stroke="'+sc+'" stroke-width="2"'+dashAttr+'/>';lastDx=x2-mx;lastDy=0;}}
    else{html+='<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+sc+'" stroke-width="2"'+dashAttr+'/>';lastDx=x2-x1;lastDy=y2-y1;}
    var ang=Math.atan2(lastDy,lastDx)*180/Math.PI;html+='<polygon points="-8,-5 0,0 -8,5" fill="'+sc+'" transform="translate('+x2+','+y2+') rotate('+ang+')"/>';
    if(ln.label){var lmx=(x1+x2)/2,lmy=(y1+y2)/2;html+='<text x="'+lmx+'" y="'+(lmy-6)+'" text-anchor="middle" fill="'+sc+'" font-size="11" font-weight="600">'+escH(ln.label)+'</text>';}
  });
  html+='</svg>';
  // テキストボックス
  tbs.forEach(function(tb){var bs=tb.borderStyle||'solid',bc=tb.borderColor||'#999';
    html+='<div class="fe-view-tb" style="position:absolute;left:'+tb.x+'px;top:'+tb.y+'px;width:'+(tb.w||200)+'px;min-height:'+(tb.h||24)+'px;color:'+(tb.color||'#333')+';background:'+(tb.bg||'#fff')+';border:2px '+bs+' '+(bs==='none'?'transparent':bc)+';border-radius:3px;padding:4px 8px;font-size:11px;line-height:1.5;white-space:pre-wrap;">'+escH(tb.text||'')+'</div>';
  });
  // ノード（shape対応、クリッカブル）
  nodes.forEach(function(n){var reg=FORM_REGISTRY.find(function(f){return f.id===n.formId;});var icon=reg?reg.icon:'description';var shape=n.shape||'rect';var bg=n.bg||'#fff';var shapeCls=shape!=='rect'?' shape-'+shape:'';
    var onclick=n.formId?'onclick="openFormById(\''+escH(n.formId)+'\')"':'';
    html+='<button class="fe-view-node'+shapeCls+'" style="position:absolute;left:'+n.x+'px;top:'+n.y+'px;width:'+(n.w||180)+'px;height:'+(n.h||36)+'px;border-left:'+(shape==='diamond'||shape==='bracket'?'none':'4px solid '+(n.color||'#1a5276'))+';background:'+bg+';" '+onclick+'>';
    if(shape!=='diamond')html+='<span class="material-icons" style="color:'+(n.color||'#1a5276')+';font-size:16px;">'+icon+'</span>';
    html+='<span style="'+(n.fontSize?'font-size:'+n.fontSize+'px;':'')+'">'+escH(n.label)+'</span></button>';
  });
  html+='</div>';
  container.innerHTML=html;
}

function renderFlowDiagram(){
  // 3つのフローを読み込み
  google.script.run.withSuccessHandler(function(list){
    if(!list||!list.length){
      renderDefaultFlow_inner();return;
    }
    // フロー名で対応するコンテナにレンダリング
    var containerMap={'業務品質管理':'flowContainer1','本部間':'flowContainer2','部間依頼':'flowContainer2','委託業務':'flowContainer3'};
    list.forEach(function(f){
      google.script.run.withSuccessHandler(function(d){
        if(!d||!d.json) return;
        // フロー名からコンテナを特定
        var cid='flowContainer1';
        for(var key in containerMap){
          if(f.name.indexOf(key)>=0){cid=containerMap[key];break;}
        }
        renderFlowDiagramFromSaved(d.json, cid);
      }).getFlowData(f.id);
    });
  }).getFlowList();
}

function buildFieldsHtml(sec,detail){
  var html='';
  if(!sec.fields) return html;
  sec.fields.forEach(function(f){
    var val=detail[f.k]||'';
    html+='<div class="form-group"><label>'+f.label+'</label>';
    if(f.type==='textarea')html+='<textarea id="f_'+f.k+'" class="form-textarea" rows="3">'+escH(val)+'</textarea>';
    else if(f.type==='number')html+='<input type="number" min="0" id="f_'+f.k+'" class="form-input" value="'+escH(val)+'">';
    else if(f.type==='select_group'){
      html+='<select id="f_'+f.k+'" class="form-select"><option value="">選択してください</option>';
      if(detailPhoneData&&detailPhoneData.groups)detailPhoneData.groups.forEach(function(g){html+='<option value="'+escH(g)+'"'+(val===g?' selected':'')+'>'+escH(g)+'</option>';});
      html+='</select>';
    } else if(f.type==='select_staff'){
      html+='<select id="f_'+f.k+'" class="form-select"><option value="">選択してください</option>';
      if(detailPhoneData&&detailPhoneData.staff)detailPhoneData.staff.forEach(function(s){html+='<option value="'+escH(s.name)+'"'+(val===s.name?' selected':'')+'>'+escH(s.name)+'</option>';});
      html+='</select>';
      if(f.other)html+='<div class="other-row"><input type="text" id="o_'+f.k+'" class="form-input sm" placeholder="その他"><button class="btn-other" onclick="setOther(\'f_'+f.k+'\',\'o_'+f.k+'\')">設定</button></div>';
    } else if(f.type==='select_approver'){
      html+='<select id="f_'+f.k+'" class="form-select"><option value="">選択してください</option>';
      if(detailPhoneData&&detailPhoneData.approvers)detailPhoneData.approvers.forEach(function(a){html+='<option value="'+escH(a.name)+'"'+(val===a.name?' selected':'')+'>'+escH(a.name+'（'+a.type+'）')+'</option>';});
      html+='</select>';
      if(f.other)html+='<div class="other-row"><input type="text" id="o_'+f.k+'" class="form-input sm" placeholder="その他"><button class="btn-other" onclick="setOther(\'f_'+f.k+'\',\'o_'+f.k+'\')">設定</button></div>';
    } else if(f.type==='select_umu'){
      html+='<select id="f_'+f.k+'" class="form-select"><option value="">選択</option><option value="有"'+(val==='有'?' selected':'')+'>有</option><option value="無"'+(val==='無'?' selected':'')+'>無</option></select>';
    } else html+='<input type="text" id="f_'+f.k+'" class="form-input" value="'+escH(val)+'">';
    html+='</div>';
  });
  return html;
}

var currentFormId='',currentFormTitle='',currentFormSheetName='';

function showFormPage(title){
  showPage('page-form');
  var p=currentProject;
  if(!title){var h3=document.querySelector('#sectionFormArea h3');title=h3?h3.textContent:'帳票';}
  document.getElementById('formPageTitle').textContent=title;
  currentFormTitle=title;
  // アイコン設定
  var reg=FORM_REGISTRY.find(function(f){return f.title===title;});
  if(reg){currentFormId=reg.id;document.getElementById('formPageIcon').textContent=reg.icon;
    // FORM_SCHEMASからシート名取得
    var schema=typeof FORM_SCHEMAS!=='undefined'&&FORM_SCHEMAS[reg.id];
    currentFormSheetName=schema?schema.sheetName:title;
  } else {
    document.getElementById('formPageIcon').textContent='description';
    currentFormSheetName=title;
  }
  updateBreadcrumb([
    {label:currentHonbu},
    {label:currentDepartment,onclick:"openDepartment('"+esc(currentHonbu)+"','"+esc(currentDepartment)+"')"},
    {label:p?p.kenmeiName||'':'',onclick:"openProjectDetail(currentProject)"},
    {label:title}
  ]);
  window.scrollTo(0,0);
  // 保存済みバッジ＋承認ボタン制御（リセット）
  document.getElementById('gf_saved_badge').style.display='none';
  document.getElementById('gf_pending_badge').style.display='none';
  document.getElementById('btnSendGenericApproval').style.display='none';
  document.getElementById('gf_form_actions').style.display='flex';
  var approveBar=document.getElementById('approveBarGeneric');if(approveBar) approveBar.style.display='none';
  if(p&&p.projectSSId&&currentFormId){
    // この帳票の承認状態を確認
    google.script.run.withSuccessHandler(function(r){
      if(r&&r.status==='pending'){
        // 承認手続き中 → readonly + バッジ
        makeFormReadonly('page-form');
        document.getElementById('gf_pending_badge').style.display='inline-flex';
        document.getElementById('gf_form_actions').style.display='none';
        document.getElementById('btnSendGenericApproval').style.display='none';
      } else {
        // 承認中でない → データがあれば承認依頼ボタン表示
        google.script.run.withSuccessHandler(function(d){
          if(d){
            document.getElementById('gf_saved_badge').style.display='inline-flex';
            document.getElementById('btnSendGenericApproval').style.display='inline-flex';
          }
        }).getGenericFormData(p.projectSSId, currentFormSheetName);
      }
    }).checkGenericApprovalStatus(p.projectSSId, currentFormId);
  }
}

// ===== 汎用承認依頼 =====
function sendGenericApprovalRequest(){
  if(!currentProject||!currentProject.projectSSId||!currentFormId) return;
  // 承認ルート検証
  showLoading('承認ルートを確認中...');
  google.script.run.withSuccessHandler(function(v){
    if(!v.valid){hideLoading();showToast(v.message,'error');return;}
    hideLoading();
    if(!confirm(currentFormTitle+'の承認依頼を'+v.bucho.name+'（部長）に送信しますか？')) return;
    showLoading('承認依頼を送信中...');
    google.script.run.withSuccessHandler(function(r){
      hideLoading();showToast(r.message,r.success?'success':'error');
      if(r.success){
        document.getElementById('btnSendGenericApproval').style.display='none';
        document.getElementById('gf_pending_badge').style.display='inline-flex';
        makeFormReadonly('page-form');
        document.getElementById('gf_form_actions').style.display='none';
      }
    }).withFailureHandler(function(e){hideLoading();showToast(e.message,'error');
    }).sendGenericApproval(currentProject.projectSSId, currentDepartment, currentHonbu, currentProject.rowIndex, currentFormId, currentFormTitle, currentFormSheetName);
  }).withFailureHandler(function(e){hideLoading();showToast(e.message,'error');
  }).validateApprovalRoute(currentDepartment, currentHonbu);
}

// ===== 汎用承認画面読込（メールリンクから）=====
function loadGenericApprovalIntoForm(){
  showLoading('承認データを読み込み中...');
  google.script.run.withSuccessHandler(function(result){
    hideLoading();
    if(!result||result.error){
      showPage('page-form');
      document.getElementById('sectionFormArea').innerHTML='<div class="approve-error-box"><span class="material-icons">error</span> '+escH(result?result.error:'データ取得失敗')+'</div>';
      return;
    }
    var rec=result.rec;
    // currentProject を承認レコードから構築
    currentProject={
      projectSSId:rec.ssId, code:rec.code, kenmeiName:rec.kenmei,
      rowIndex:rec.rowIndex, contractor:''
    };
    currentDepartment=rec.dept;
    currentHonbu=getHonbuByDeptLocal(rec.dept);
    currentFormId=rec.formId;currentFormTitle=rec.formTitle;currentFormSheetName=rec.sheetName;

    // 実際のフォーム関数を呼び出してフォームを描画
    var formReg=FORM_REGISTRY.find(function(f){return f.id===rec.formId;});
    if(formReg){
      openFormById(rec.formId);
    } else {
      // FORM_REGISTRYにない場合はフォールバック
      showPage('page-form');
      document.getElementById('formPageTitle').textContent=rec.formTitle;
      document.getElementById('formPageIcon').textContent='gavel';
      var fd=result.formData||{};
      renderSimpleApprovalForm(fd, rec);
    }

    // データ読み込み完了を待ってからreadonly化 + 承認バー表示
    setTimeout(function(){
      makeFormReadonly('page-form');
      var bar=document.getElementById('approveBarGeneric');
      bar.style.display='block';
      bar.innerHTML=buildApproveBar('generic',getStepLabelJs(rec.step));
      document.getElementById('gf_form_actions').style.display='none';
      document.getElementById('gf_pending_badge').style.display='inline-flex';
    },1500);
  }).withFailureHandler(function(e){hideLoading();
    showPage('page-form');
    document.getElementById('sectionFormArea').innerHTML='<div class="approve-error-box"><span class="material-icons">error</span> '+escH(e.message)+'</div>';
  }).getGenericApprovalData(GENERIC_APPROVE_TOKEN);
}

  var area=document.getElementById('sectionFormArea');

  schema.sections.forEach(function(sec){
    h+='<div class="gf-section"><div class="gf-section-title">'+escH(sec.title)+'</div>';

      sec.fields.forEach(function(f){

      sec.items.forEach(function(item){
        var val=data[item.key]||'';
        h+='<div class="gf-check-item"><span class="gf-check-label">'+escH(item.label)+'</span>';
        h+='<span class="contract-yn" style="font-weight:bold;color:#0f3460;">'+escH(val)+'</span></div>';
      });
    } else if(sec.type==='table'){
      var td=data['_table_'+sec.keyPrefix]||'';
      if(td){
        h+='<div class="gf-table-wrap"><table class="gf-table"><thead><tr>';
        sec.columns.forEach(function(c){h+='<th>'+escH(c)+'</th>';});
        h+='</tr></thead><tbody>';
        td.split('\n').forEach(function(row){h+='<tr>';row.split('|').forEach(function(c){h+='<td>'+escH(c)+'</td>';});h+='</tr>';});
        h+='</tbody></table></div>';
      }
    }
    h+='</div>';
  });
  h+='</div></div>';
  area.innerHTML=h;
}

// ===== PDF印刷 =====
function printCurrentForm(){
  var activePage=document.querySelector('.page.active');
  if(!activePage) return;

  // 印刷対象のHTMLコンテンツを取得
  var contentEl=activePage.querySelector('.print-area,.contract-doc,.minutes-doc');
  if(!contentEl) contentEl=activePage;

  // DOMをクローンして値を焼き付け
  var clone=contentEl.cloneNode(true);

  // input/textarea/selectの現在値をHTML属性に焼き付け
  var origInputs=contentEl.querySelectorAll('input,textarea,select');
  var cloneInputs=clone.querySelectorAll('input,textarea,select');
  for(var i=0;i<origInputs.length;i++){
    var orig=origInputs[i],cl=cloneInputs[i];
    if(!orig||!cl) continue;
    if(orig.type==='radio'||orig.type==='checkbox'){
      if(orig.checked) cl.setAttribute('checked','checked');
      else cl.removeAttribute('checked');
    } else if(orig.tagName==='TEXTAREA'){
      cl.textContent=orig.value;
    } else if(orig.tagName==='SELECT'){
      var opts=cl.querySelectorAll('option');
      for(var j=0;j<opts.length;j++){
        if(opts[j].value===orig.value) opts[j].setAttribute('selected','selected');
        else opts[j].removeAttribute('selected');
      }
    } else {
      cl.setAttribute('value',orig.value);
    }
  }

  // 不要要素を除去
  clone.querySelectorAll('.btn-close-section,.btn-save,.btn-primary,.btn-secondary,.btn-send,.btn-reject,.btn-approve,.gf-actions,.minutes-actions,.approve-bar,.no-print,.form-page-topbar,.minutes-doc-topbar,.other-row,.saved-badge,.readonly-badge').forEach(function(el){el.remove();});

  // 印刷ヘッダー追加
  var p=currentProject;
  var headerHtml='';
  if(p){
    var dateStr=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'});
    headerHtml='<div style="display:flex;justify-content:space-between;font-size:8pt;color:#888;margin-bottom:4px;">'
      +'<span style="font-weight:600;">'+(p.code||'')+'</span>'
      +'<span>印刷日: '+dateStr+'</span></div>'
      +'<div style="font-size:11pt;font-weight:bold;color:#0f3460;margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid #0f3460;">'+(p.kenmeiName||'')+'</div>';
  }

  var formHtml=headerHtml+clone.innerHTML;

  // タイトル取得
  var titleEl=document.getElementById('formPageTitle');
  var title=(titleEl?titleEl.textContent:'')
    ||activePage.querySelector('.contract-doc-title,.minutes-doc-title');
  if(typeof title==='object'&&title) title=title.textContent;
  title=title||'帳票';

  var ssId=(currentProject&&currentProject.projectSSId)||'';

  showLoading('PDF生成中...');
  google.script.run.withSuccessHandler(function(r){
    hideLoading();
    if(r.success){
      showToast('PDF生成完了','success');
      window.open(r.url,'_blank');
    } else {
      showToast(r.message,'error');
    }
  }).withFailureHandler(function(e){
    hideLoading();showToast('PDF生成エラー: '+e.message,'error');
  }).generateOnDemandPDF(formHtml, title, ssId);
}

function renderComments(comments){
  var ct=document.getElementById('commentThread');
  if(!ct) return;
  if(!comments||!comments.length){ct.innerHTML='<div class="no-comments">コメントはありません</div>';return;}
  var html='';
  comments.forEach(function(c){
    var resolved=c.resolved==='確認済み';
    html+='<div class="comment-item'+(resolved?' comment-resolved':'')+'">';
    html+='<div class="comment-meta"><span class="comment-author">'+escH(c.author)+'</span>';
    html+='<span class="comment-date">'+escH(c.date)+'</span>';
    html+='<span class="comment-section-tag">'+escH(c.section)+'</span>';
    if(resolved) html+='<span class="comment-resolved-tag">✓ 確認済み ('+escH(c.resolvedDate)+')</span>';
    html+='</div>';
    html+='<div class="comment-body">'+escH(c.content)+'</div>';
    if(isQC&&!resolved) html+='<button class="btn-resolve" onclick="resolveComment('+c.sheetRow+')"><span class="material-icons">check_circle</span> 確認済みにする</button>';
    html+='</div>';
  });
  ct.innerHTML=html;
}

function handleReportUpload(){
  var input=document.getElementById('reportFileInput');
  if(!input.files||!input.files.length) return;
  var file=input.files[0];
  if(file.size>10*1024*1024){showToast('ファイルは10MB以下にしてください','error');return;}
  var status=document.getElementById('uploadStatus');
  status.textContent='アップロード中...';
  var reader=new FileReader();
  reader.onload=function(e){
    var base64=e.target.result.split(',')[1];
    google.script.run.withSuccessHandler(function(r){
      status.innerHTML=r.success?'<span style="color:green;">✓ '+escH(r.message)+'</span>':'<span style="color:red;">'+escH(r.message)+'</span>';
    }).withFailureHandler(function(err){status.textContent='エラー: '+err.message;
    }).uploadReport(currentProject.projectSSId, file.name, base64);
  };
  reader.readAsDataURL(file);
}

// リスク表の収集・復元
function collectRiskTableData(){
  var arr=[];
  for(var t=1;t<=10;t++){
    var shingi=gv('rt_'+t+'_shingi');
    var umu=gv('rt_'+t+'_umu');
    var taisaku=gv('rt_'+t+'_taisaku');
    var gutai=gv('rt_'+t+'_gutai');
    var detail10=(t===10)?gv('rt_10_detail'):'';
    var parts=[shingi,umu,taisaku,gutai];
    if(t===10 && detail10) parts.push(detail10);
    arr.push(parts.join('|'));
  }
  return arr;
}
function loadRiskTableData(arr){
  if(!arr||!arr.length) return;
  for(var t=0;t<arr.length&&t<10;t++){
    var val=arr[t]; if(!val) continue;
    var parts=val.split('|');
    var n=t+1;
    if(parts[0]){var el=document.getElementById('rt_'+n+'_shingi'); if(el) el.value=parts[0];}
    if(parts[1]){var el2=document.getElementById('rt_'+n+'_umu'); if(el2) el2.value=parts[1];}
    if(parts[2]){var el3=document.getElementById('rt_'+n+'_taisaku'); if(el3) el3.value=parts[2];}
    if(parts[3]){var el4=document.getElementById('rt_'+n+'_gutai'); if(el4) el4.value=parts[3];}
    if(n===10&&parts[4]){var el5=document.getElementById('rt_10_detail'); if(el5) el5.value=parts[4];}
  }
}

function loadTaiseiData(taisei, reason, approver, reviewer){
  if(!taisei) return;
  var group='';
  if(taisei.indexOf('A')===0) group='A';
  else if(taisei.indexOf('B')===0) group='B';
  else if(taisei==='C体制') group='C';
  else if(taisei==='特別体制') group='SP';
  document.querySelectorAll('input[name="cf_taisei"]').forEach(function(r){
    if(r.value===group) r.checked=true;
  });
  if(group==='A'){
    document.getElementById('cf_taisei_a').disabled=false;
    document.getElementById('cf_taisei_a').value=taisei;
  } else if(group==='B'){
    document.getElementById('cf_taisei_b').disabled=false;
    document.getElementById('cf_taisei_b').value=taisei;
  } else if(group==='SP'){
    document.getElementById('cf_taisei_sp_area').style.display='block';
    if(reason) document.getElementById('cf_taisei_sp_reason').value=reason;
    if(approver) document.getElementById('cf_taisei_sp_approver').value=approver;
    if(reviewer) document.getElementById('cf_taisei_sp_reviewer').value=reviewer;
  }
}

function buildApproveBar(type,stepLabel){
  var h='<div class="approve-bar">';
  h+='<div class="approve-bar-info"><span class="material-icons" style="color:var(--primary);font-size:24px;">gavel</span>';
  h+='<span class="approve-bar-label">承認手続き中（'+escH(stepLabel)+'）</span></div>';
  h+='<div class="approve-bar-actions" id="approveBarActions_'+type+'">';
  h+='<button class="btn-approve" onclick="doApproveAction(\''+type+'\')"><span class="material-icons">check_circle</span> 承認</button>';
  h+='<button class="btn-reject" onclick="toggleRejectForm(\''+type+'\')"><span class="material-icons">cancel</span> 否決</button></div>';
  h+='<div class="approve-bar-reject" id="approveBarReject_'+type+'" style="display:none;">';
  h+='<textarea id="rejectComment_'+type+'" class="form-textarea" rows="2" placeholder="否決の理由を入力"></textarea>';
  h+='<button class="btn-reject" onclick="doRejectAction(\''+type+'\')"><span class="material-icons">send</span> 否決して差戻</button></div>';
  h+='<div class="approve-bar-result" id="approveBarResult_'+type+'" style="display:none;"></div></div>';
  return h;
}

// ===== 共通: 読み取り専用化 =====
function makeFormReadonly(pageId){
  var page=document.getElementById(pageId);if(!page) return;
  // 全input/textarea/selectを無効化
  page.querySelectorAll('input,textarea,select').forEach(function(el){
    el.setAttribute('readonly','readonly');
    el.setAttribute('disabled','disabled');
    el.style.opacity='0.8';
    el.style.pointerEvents='none';
  });
  // radio/checkboxはclickを防止
  page.querySelectorAll('input[type="radio"],input[type="checkbox"]').forEach(function(el){
    el.style.pointerEvents='none';
  });
  // 保存・送信ボタン非表示
  page.querySelectorAll('.minutes-actions,.gf-actions').forEach(function(el){el.style.display='none';});
  // 読み取り専用バナー
  var topbar=page.querySelector('.minutes-doc-topbar,.form-page-topbar');
  if(topbar){
    var badge=document.createElement('span');
    badge.className='readonly-badge';badge.textContent='閲覧専用（承認手続き中）';badge.style.display='inline-flex';
    topbar.appendChild(badge);
  }
}

// ===== 承認実行 =====
function doApproveAction(type){
  if(!confirm('承認しますか？')) return;
  showLoading('承認処理中...');
  var token=type==='contract'?CONTRACT_APPROVE_TOKEN:(type==='generic'?GENERIC_APPROVE_TOKEN:APPROVE_TOKEN);
  var fn=type==='contract'?'approveContract':(type==='generic'?'approveGenericForm':'approveMinutes');
  google.script.run.withSuccessHandler(function(r){
    hideLoading();
    var acts=document.getElementById('approveBarActions_'+type);if(acts) acts.style.display='none';
    var rej=document.getElementById('approveBarReject_'+type);if(rej) rej.style.display='none';
    var res=document.getElementById('approveBarResult_'+type);
    res.style.display='block';
    res.innerHTML=r.success
      ?'<div class="approve-success"><span class="material-icons">check_circle</span> '+escH(r.message)+'</div>'
      :'<div class="approve-error-box"><span class="material-icons">error</span> '+escH(r.message)+'</div>';
  }).withFailureHandler(function(e){hideLoading();showToast(e.message,'error');})[fn](token);
}

function toggleRejectForm(type){
  var el=document.getElementById('approveBarReject_'+type);
  el.style.display=el.style.display==='none'?'flex':'none';
}

function doRejectAction(type){
  var comment=document.getElementById('rejectComment_'+type).value;
  if(!comment){showToast('否決コメントを入力してください','info');return;}
  if(!confirm('否決して差戻しますか？')) return;
  showLoading('否決処理中...');
  var token=type==='contract'?CONTRACT_APPROVE_TOKEN:(type==='generic'?GENERIC_APPROVE_TOKEN:APPROVE_TOKEN);
  var fn=type==='contract'?'rejectContract':(type==='generic'?'rejectGenericForm':'rejectMinutes');
  google.script.run.withSuccessHandler(function(r){
    hideLoading();
    var acts=document.getElementById('approveBarActions_'+type);if(acts) acts.style.display='none';
    var rej=document.getElementById('approveBarReject_'+type);if(rej) rej.style.display='none';
    var res=document.getElementById('approveBarResult_'+type);
    res.style.display='block';
    res.innerHTML='<div class="approve-error-box"><span class="material-icons">cancel</span> '+escH(r.message)+'</div>';
  }).withFailureHandler(function(e){hideLoading();showToast(e.message,'error');})[fn](token,comment);
}
